name: Publish
run-name: Publish

on:
  workflow_run:
    workflows: ["Test"]
    branches: [master]
    types:
      - completed

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Get version from VERSION file
        id: get_version
        run: |
          VERSION=$(tr -d '\n\r' < VERSION)
          VERSION_REGEX='^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?([+][0-9A-Za-z][0-9A-Za-z.-]*)?$'

          if [[ ! "$VERSION" =~ $VERSION_REGEX ]]; then
            echo "Version must match SemVer, for example 1.2.3 or 1.2.3-beta.1" >&2
            exit 1
          fi

          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # Release whenever VERSION is ahead of the tags: idempotent, and
      # self-healing when the bump push itself failed CI.
      - name: Check if tag already exists
        id: check_tag
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${VERSION} does not exist"
          fi

  release:
    name: Publish
    needs: validate
    if: needs.validate.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # Get commits since last tag (or all if no previous tag)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
            echo "## Changes since ${LAST_TAG}" > changelog.md
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
            echo "## Initial Release" > changelog.md
          fi

          echo "" >> changelog.md
          echo "$COMMITS" >> changelog.md
          echo "" >> changelog.md
          echo "**Full Changelog**: https://github.com/${REPOSITORY}/commits/v${VERSION}" >> changelog.md

          cat changelog.md

      - name: Create and push tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create tag only if it doesn't exist
          if ! git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
            echo "Tag v${VERSION} created and pushed"
          else
            echo "Tag v${VERSION} already exists, skipping"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # dawidd6/action-homebrew-bump-formula (and the `brew bump-formula-pr`
      # it wraps) can only bump an existing stable url/sha256 spec - it
      # crashes (NoMethodError on a nil stable spec) against a head-only
      # formula. Skip it with a clear message until the tap formula has a
      # real stable stanza; add one by hand once, then bumps work normally.
      - name: Check Homebrew tap formula readiness
        id: tap_check
        run: |
          FORMULA_CONTENT=$(curl -fsSL "https://raw.githubusercontent.com/jackofspade/homebrew-tap/master/Formula/ccblocks.rb")

          if echo "$FORMULA_CONTENT" | grep -qE '^\s*url\s+"'; then
            echo "has_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_stable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Formula/ccblocks.rb in jackofspade/homebrew-tap only has a head block (no stable url/sha256 yet). Skipping the Homebrew publish steps for v${{ needs.validate.outputs.version }}: dawidd6/action-homebrew-bump-formula requires an existing stable spec to bump and will crash on a head-only formula. Add a real url + sha256 stanza to the formula by hand once (the v${{ needs.validate.outputs.version }} release tarball now exists at https://github.com/${{ github.repository }}/archive/refs/tags/v${{ needs.validate.outputs.version }}.tar.gz), then future VERSION bumps will publish to the tap automatically."
          fi

      - name: Publish to Homebrew tap
        if: steps.tap_check.outputs.has_stable == 'true'
        uses: dawidd6/action-homebrew-bump-formula@1446dca236b0440c6f02723a3f14f13be2c04ab0 # v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula: ccblocks
          tap: jackofspade/homebrew-tap
          tag: v${{ needs.validate.outputs.version }}

      - name: Auto-merge Homebrew tap PR
        if: steps.tap_check.outputs.has_stable == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          # Wait for PR to be created
          sleep 5

          # Find and merge the bump PR
          PR_NUMBER=$(gh pr list \
            --repo jackofspade/homebrew-tap \
            --head "bump-ccblocks-${VERSION}" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" \
              --repo jackofspade/homebrew-tap \
              --squash \
              --subject "chore: bump ccblocks to ${VERSION}" \
              --body ""
            echo "✓ Merged PR #$PR_NUMBER"
          else
            echo "⚠ No PR found for bump-ccblocks-${VERSION}"
            exit 1
          fi
